{{- if .Values.nebariapp.enabled }}
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: {{ include "nebari-data-science-pack.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-data-science-pack.labels" . | nindent 4 }}
spec:
  hostname: {{ required "Set keycloak.hostname (for auto-derivation) or nebariapp.hostname explicitly." (include "nebari-data-science-pack.hubHostname" .) }}
  service:
    name: {{ .Values.nebariapp.service.name | default "proxy-public" }}
    port: {{ .Values.nebariapp.service.port | default 80 }}
  {{- with .Values.nebariapp.routing }}
  routing:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.nebariapp.auth }}
  {{- /* Full passthrough, like routing above: every AuthConfig field the
     operator understands is settable from values without a chart change.
     Defaults live in values.yaml, not here. */}}
  auth:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.nebariapp.landingPage }}
  landingPage:
    enabled: {{ .enabled | default false }}
    {{- with .displayName }}
    displayName: {{ . | quote }}
    {{- end }}
    {{- with .description }}
    description: {{ . | quote }}
    {{- end }}
    {{- with .icon }}
    icon: {{ . | quote }}
    {{- end }}
    {{- with .category }}
    category: {{ . | quote }}
    {{- end }}
    {{- with .priority }}
    priority: {{ . }}
    {{- end }}
    {{- with .externalUrl }}
    externalUrl: {{ . | quote }}
    {{- end }}
    {{- with .healthCheck }}
    healthCheck:
      enabled: {{ .enabled | default false }}
      {{- with .path }}
      path: {{ . | quote }}
      {{- end }}
      {{- with .intervalSeconds }}
      intervalSeconds: {{ . }}
      {{- end }}
      {{- with .timeoutSeconds }}
      timeoutSeconds: {{ . }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
